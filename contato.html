        <div class="conteudo-main">
            <h1>Blog sobre 4 Rodas</h1>
            <div class="form-container">
                <section class="formulario">
                    <h2>Formulário de contato</h2>
                    <form action="" id="formulario-contato">
                        <div class="input-box">
                            <label for="nome-completo">Nome completo</label>
                            <input type="text" name="nome-completo" id="nome-completo" placeholder="Digite seu nome" required>
                        </div>
                        <div class="input-box">
                            <label for="email">Email</label>
                            <input type="email" name="email" id="email" placeholder="email@email.com" required>
                        </div>
                        <div class="input-box">
                            <label for="telefone">Telefone</label>
                            <input type="text" name="telefone" id="telefone" placeholder="(xx) 9 xxxx-xxxx" required>
                        </div>
                        <div class="input-box">
                            <label for="assunto">Assunto</label>
                            <textarea name="assunto" id="assunto" placeholder="Digite sua dúvida aqui" required></textarea>
                        </div>
                        <div class="input-box">
                            <button type="submit">Enviar</button>
                        </div>
                    </form>
                </section>
